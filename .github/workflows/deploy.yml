name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install minification tools
        run: sudo npm install -g csso-cli html-minifier-terser
        # run: sudo npm install -g terser csso-cli html-minifier-terser

      #- name: Minify JS
      #  run: |
      #    terser dist/assets/codewheel.js -o dist/assets/codewheel.js -c -m
      #    terser dist/assets/interact.js   -o dist/assets/interact.js   -c -m

      - name: Minify CSS
        run: |
          csso index.css --output index.css

      - name: Minify HTML
        run: |
          OPTS="--collapse-whitespace --remove-comments"
          html-minifier-terser $OPTS index.html -o index.html

      - name: Push to dist branch
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          SHA=$(git rev-parse --short HEAD)
          cp index.css index.html erdferkel.svg /tmp/dist-build
          git checkout --orphan dist-new
          git rm -rf . --quiet
          cp /tmp/dist-build/. .
          git add .
          git commit -m "dist: build from $SHA"
          git push origin HEAD:dist --force

      - name: Trigger webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          TIMESTAMP=$(date +%s)
          ID=$(uuidgen | tr '[:upper:]' '[:lower:]')
          PAYLOAD="{\"id\":\"$ID\",\"param\":\"erdferkel\",\"unix_seconds\":$TIMESTAMP}"
          SIG=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')
          curl -sf -X POST https://webhook.erdferkel.eu/ \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIG" \
            -d "$PAYLOAD"
